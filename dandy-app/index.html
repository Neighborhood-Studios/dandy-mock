  ══════════════════════════════════════════════════════════════════════════
  DANDY — MOBILE APP DESIGN MOCK  (single-file, mobile-fixed)
  ══════════════════════════════════════════════════════════════════════════

  PURPOSE
  This is a workable HTML mock of the Dandy consumer mobile app, built from
  the real production codebase (React Native / Expo). It exists so the design
  team (and Claude Design) can iterate on visuals + flows without touching
  the app. Every screen is a template function in SCREENS below; navigation
  is data-go="screenId". Add a screen = add a template + a FLOW_INDEX entry.

  HOW TO NAVIGATE
  • Tap the ✦ pill (top-right) any time to open the Flow Index — every
    screen and edge-case variant is jump-linked there.
  • Happy paths are fully tappable end-to-end: onboarding, add-task-by-video,
    book-a-visit, refer.

  BRAND TOKENS (source of truth: apps/mobile/theme.js + tailwind.config.js
  + src/theme/customer.ts) — all exposed as CSS variables on :root below.

  ★ v9 — "THE RECEIPT YOU DIDN'T GET" (value panel)
  • New Wrapped panel at index 3 (story is now 8 panels): the ROI moment.
    Staged reveal, each beat ~0.5s apart:
      1. Eyebrow + intro fade in: "We priced today's six jobs against
         typical handyman-marketplace rates in Atlanta."
      2. The meter runs: "$0" tallies up to $836 with cubic ease-out
         (uneven jumps, tabular numerals), lands with a scale nudge;
         caption fades: "3 repairs · trip fees · a parts run · your
         Saturday".
      3. A pink strike draws across the number.
      4. The white Dandy card slides up — "YOU PAID $149/mo ✦ — Bill,
         parts sourcing, and autopilot, all in" — with a sparkle burst.
      5. Fine print fades last: "Estimate averages listed Atlanta
         marketplace rates for comparable jobs, incl. service-call fees".
    The $836 figure and fine print are PLACEHOLDER MATH — before launch,
    replace with a real per-task comparable-rate lookup so the claim is
    defensible. The choreography lives in AFTER.wrapped (p===3).
  • Panels 4–7 shifted (zero moment, suggestions, rating, finale);
    advance targets and flow-index deep links updated.

  ★ v8 — WRAPPED INTERACTION FIXES (from device testing)
  • ROOT-CAUSE FIX for buttons advancing the slide: .story-body declared
    z-index:4, creating a stacking context that trapped ALL its children
    below the z-5 tap zones — so taps on quick-add/stars hit the invisible
    "next" zone instead. story-body is now static; .story-live blocks
    (z-6) genuinely sit above the tap zones. Tapping a button = the
    button; tapping dead space = advance.
  • Quick-add: button flips green "✓ Added to your task list" and STAYS
    on the slide. When BOTH suggestions are added (individually or via
    the pink "✦ Add all suggested tasks"), the Add-all button turns green
    ("✓ Both added to your list"), a green burst fires, the note flips to
    "Bill will see them before your next visit", and the story advances
    itself — same rhythm as the 3-2-1 zero moment.
  • Stars: five individually tappable brand-pink SVG stars (were emoji).
    Tap to set, tap again to adjust — each tap replays a cascade fill
    with a pop, 4–5 stars gets the surprise burst (5 gets a double), and
    the panel advances ~1.6s after the LAST tap. Rating persists on
    back-tap (S.wrapStars). Generation token prevents rapid-switch
    timers from re-lighting stale stars.

  ★ v7 — WRAPPED INTERACTIONS
  • Quick-add is now REAL: tapping ＋ on one of Bill's suggestions adds the
    task to TASKS + S.backlog (it's waiting in To-do's with his face badge)
    — WITHOUT leaving the story. Feedback is all in place: button flips to
    ✓ On your list, the card settles (scale + green edge), a "+1 to your
    list ✦" chip floats up from the button, mini burst, and a reassurance
    line ("They'll be waiting in your To-do's"). State persists across
    back-taps and replays (S.wrapAdded).
  • "✦ Add all suggested tasks" — pink one-tap button under the cards;
    adds every remaining suggestion with a 320ms stagger so each card gets
    its own moment, then flips to ✓ All on your list.
  • Stars are switchable: tap to set, tap again to change (S.wrapStars).
    The panel auto-advances ~1.6s after the LAST tap — switching resets
    the clock; leaving the story cancels the pending advance.
  • FIX: story tap-zones were layered above panel buttons (would have
    blocked taps on device). Interactive blocks now carry .story-live
    (z-6 > tap-zone z-5).

  ★ v6 — VISIT WRAPPED + DELIGHT SYSTEM
  • VISIT WRAPPED ✦ (SCREENS.wrapped) — post-visit tap-through story,
    Instagram mechanics: segmented progress bars, tap right/left to
    advance/rewind, ✕ to dismiss. Seven panels:
      0 "Bill was here" (photo reveal)
      1 What got done (task cards slide up, checked)
      2 Autopilot bonus on warm pink — items tick themselves off
      3 THE ZERO MOMENT — big number counts 3→0 "things you had to think
        about", then bursts. The thesis of the product in one screen.
      4 "Bill noticed a few things" — his suggestions slide up with
        quick-add buttons that flip in place (＋ Add → ✓ Added + burst)
      5 Rate Bill — stars light on tap, 4+ stars burst
      6 Finale — "See you in October" + hours banking + refer hook
    Entry: dark-blue recap card at the top of Home ("Your visit recap is
    ready"). In production this should auto-present on first open after a
    completed visit, once.
  • SPARKLE BURST SYSTEM — burst(el): ~16 brand-colored particles (pink ✦,
    cream/white dots) fly outward and fade. Fires on: task created
    (camSuccess), visit booked (bookSuccess), drag-to-schedule success,
    wrapped zero-moment/quick-add/5-star/finale. CSS transform/opacity
    only; reduced-motion disables all of it.
  • HOME HEADER reworked: GOOD MORNING eyebrow + big name, and the promise
    moved to a status line with a live green dot — "Your home's taken care
    of · next visit in 6 days". No more awkward two-line headline wrap.

  ★ v5 — EXPERIENCE & NARRATIVE PASS (designer's notes)
  Design thesis: the app is a RELATIONSHIP, not a tool. Bill is the product,
  banked hours are the currency, Autopilot is the magic. Voice blends
  hidandy.com ("a familiar face, on a first-name basis", "your home, our
  hands") with getcasa.com's autopilot framing ("never think about
  maintenance again").

  • ONBOARDING rebuilt as a story arc:
      welcome (50-memberships scarcity) → MEET BILL (real photo, W2 +
      background-check trust markers, "one of 50 homes", his own words,
      specialties) → 3-panel HOW DANDY WORKS story:
        1. You spot it, we fix it (video task)
        2. Bill knows your home (his suggestions)
        3. Autopilot ✦ — the signature moment: five routine-care items
           tick themselves off on screen (smoke detectors, HVAC filter,
           gutters, weatherstripping, dryer vent)
      → HOURS (bar fills, counter ticks to 1.5) → home.
  • THREE-LANE TASK MODEL surfaced everywhere: tasks carry source
    'you' / 'bill' / 'auto'. Bill's picks wear his actual face as a badge
    + a "why" note on the detail screen; Autopilot gets the ✦ treatment.
  • HOME: greeting is now a promise ("Your home's taken care of ✦"),
    an ON AUTOPILOT card lists what Bill folds into the next visit
    ("nothing for you to do"), suggestions became FROM BILL with
    personal, home-specific reasons in his voice.
  • TO-DO'S: autopilot strip rides inside the visit section.
  • MOTION SYSTEM (transform/opacity only, reduced-motion safe):
    staggered content rise on every screen, Bill photo spring-in, success
    check pop, hours count-up on first home load, progress-bar fills,
    single twinkling sparkle on hero moments, autopilot tick sequence.

  ★ v4 CHANGES
  • FIX: tab bar no longer scrolls with content. It was rendered inside the
    scrolling #screen; it now mounts into #tabhost, a fixed sibling layer
    (screens opt in by calling tabbar('home') — see renderTabbar/go()).
  • Camera button upgraded from glass to a true primary action: solid
    dandy-blue gradient circle, white camera icon, pink ＋ badge, brand glow,
    and an "Add task" micro-label. It's the one loud element in the nav.
  • ✦ Flows pill (design-team navigator) moved to top center, dynamic-island
    style, so it never covers corner chrome.
  • Hours badge is now circular and number-forward: big "4.5" over a small
    uppercase HOURS. Tap-through to the explainer unchanged.
  • Copy: full-visit framing is now "a whole half day" (was "morning").

  ★ v3 CHANGES
  • Navigation rebuilt to mirror the production GlassTabBar.tsx: floating
    frosted pill (Home / To-do's / Profile) with a sliding white indicator,
    plus a separate glass circle button — now the CAMERA (add-a-task flow),
    replacing the old AI-sparkle helper. See .tabwrap / tabbar().
  • To-do's rebuilt to mirror TasksListDraggable: four segments (To-Do's /
    Done / Skipped / Archive), an Upcoming Visit section with live capacity
    chip, the full-width "Schedule your next visit" button, a YOUR LIST
    backlog divider, and working pointer-based DRAG & DROP — reorder rows
    or drag a task up onto the visit to schedule it (capacity enforced,
    same 240-min budget as booking). See startDrag/onDragMove/onDragEnd.
  • Sleekness pass: Inter webfont, SVG status bar + chevrons + line icons
    (no emoji in chrome), tighter buttons/segments/rows, springy presses.

  ★ CADENCE-PLANS MODEL (v2.1 — the interim go-to-market; replaces the
    hours bank, which is preserved intact in ui_kits/app/)
  • Everyone pays $149/mo. No hours bank. Bill (founder) sets the visit
    cadence in person during the onboarding walkthrough:
      quarterly → half-day visit (4h ≈ 210 task-min) every quarter — the
                  plan Bill pitches; he books the next one before leaving
      monthly   → 1.5-hour visit (≈75 task-min) every month — the marketing
                  hook that gets walkthroughs booked
  • State: S.plan ('quarterly'|'monthly') — toggle it from the flow index,
    or run Bill's internal walkthrough tool (billOnboard) like a test user.
  • Plan changes are HUMAN: every prompt opens a text thread to Bill with a
    pre-filled SMS (smsBill screen; SMS_BODIES) —
      monthly booking   → "switch me to quarterly half-days"
      quarterly booking → "need a short one-off drop-in this month"

  EDGE CASES COVERED (all from real app logic)
  • Onboarding: outside service area (NeighborhoodsMap step)
  • Onboarding: handyman fetch fails → Meet Handyman step skipped
  • Video task: first-time tips overlay (one-time flag)
  • Video task: camera/mic permission denied
  • Video task: 3:00 max recording auto-stop
  • Video task: processing pipeline states + failure/retry (files kept)
  • Task lock: parts-help tasks lock ≤10 days before visit (managers bypass)
  • Booking: time-slot taken between select & confirm (re-validation)
  • Booking: capacity scales with visit type (75 / 240 task-minutes)
  • Booking: monthly 2h overload → "ask Bill about quarterly" nudge
  • Plans: switch / drop-in requests route through a pre-filled text to Bill
  • Booking: 7-task cap when any task lacks a time estimate
  • Visits: callback visits are view-only (no edit/cancel in consumer app)
  • To-dos: empty / completed / out-of-scope segments
  • Home: brand-new user (no tasks, no visits)
  ══════════════════════════════════════════════════════════════════════════

<style>
/* ─────────────────────────────────────────────
   1. BRAND TOKENS  — from the production app
   ───────────────────────────────────────────── */
:root{
  /* Core palette (theme.js → brandColors.dandy) */
  --dandy-blue:        #003953;
  --dandy-blue-light:  #074D6F;
  --dandy-pink:        #F9ABAC;
  --dandy-pink-light:  #FDDEDE;
  --dandy-tan:         #EFE8DF;
  --dandy-tan-light:   #F7F3EE;
  --dandy-cream:       #FFF8F0;
  --dandy-warm:        #EDE4D8;   /* canonical customer background */

  /* Text (tailwind.config.js) */
  --text-primary:   var(--dandy-blue);
  --text-secondary: rgba(0,57,83,.66);
  --text-tertiary:  rgba(0,57,83,.40);
  --text-inverse:   #FFFFFF;

  /* Glass morphism */
  --glass:            rgba(255,255,255,.55);
  --glass-heavy:      rgba(255,255,255,.70);
  --card:             rgba(255,255,255,.85);
  --card-border:      rgba(0,57,83,.10);
  --glass-border:     rgba(255,255,255,.45);
  --step-inactive:    #E0D8CF;
  --segment-bg:       rgba(232,224,214,.5);
  --segment-indicator:rgba(255,255,255,.75);

  /* Status */
  --success: #2E7D32;
  --danger:  #F44336;

  /* Gradient header */
  --grad-header: linear-gradient(135deg,#003953 0%,#074D6F 100%);

  /* Radii (customerRadius) */
  --r-sm:12px; --r-md:16px; --r-lg:20px; --r-xl:28px; --r-full:9999px;

  /* Shadows */
  --sh-glass: 0 8px 32px rgba(0,0,0,.08);
  --sh-glass-sm: 0 4px 16px rgba(0,0,0,.06);
  --sh-tab: 0 4px 24px rgba(0,0,0,.12);
  --sh-cta: 0 2px 8px rgba(0,57,83,.2);

  /* Spacing (customerSpacing) */
  --sp-screen:20px; --sp-card:16px; --sp-section:16px; --sp-item:12px;
}

/* ─────────────────────────────────────────────
   2. BASE / PHONE FRAME  — mobile-fixed
   ───────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#1a1a1a;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-primary);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}
/* The app lives inside a fixed mobile frame. On phones it fills the screen;
   on desktop it renders as a centered 390pt device. No responsive layout —
   this mock is mobile-only by design. */
#phone{
  position:relative;width:390px;height:844px;max-height:100vh;
  background:var(--dandy-warm);overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.5);border-radius:0;
}
@media (min-width:480px) and (min-height:900px){
  #phone{border-radius:44px;border:10px solid #0d0d0d}
}
@media (max-width:479px){
  body{display:block;background:var(--dandy-warm)}
  #phone{width:100%;height:100dvh;max-height:none;box-shadow:none}
}
#screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  scrollbar-width:none;-ms-overflow-style:none}
#screen::-webkit-scrollbar{display:none}

/* iOS-style status bar (decorative) */
.statusbar{height:44px;display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 24px 6px;font-size:14px;font-weight:600;flex:none;position:relative;z-index:5}
.statusbar .sb-icons{display:flex;gap:5px;font-size:12px;letter-spacing:1px}
.statusbar.light{color:#fff}

/* ─────────────────────────────────────────────
   3. TYPOGRAPHY  (customerTypography)
   ───────────────────────────────────────────── */
.t-page-title{font-weight:700;font-size:30px;line-height:1.2;color:var(--dandy-blue)}
.t-screen-title{font-weight:700;font-size:24px;line-height:30px;color:var(--dandy-blue)}
.t-section-title{font-weight:700;font-size:18px;line-height:24px;color:var(--dandy-blue)}
.t-card-title{font-weight:600;font-size:15px;line-height:20px;color:var(--dandy-blue)}
.t-body{font-weight:400;font-size:15px;line-height:22px;color:var(--dandy-blue)}
.t-body-med{font-weight:500;font-size:15px;line-height:22px;color:var(--dandy-blue)}
.t-caption{font-weight:400;font-size:13px;line-height:18px;color:var(--text-secondary)}
.t-label{font-weight:600;font-size:14px;line-height:20px;color:var(--text-secondary)}
.t-section-label{font-weight:700;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-tertiary)}
.t-error{font-weight:500;font-size:14px;color:var(--danger)}

/* ─────────────────────────────────────────────
   4. COMPONENTS
   ───────────────────────────────────────────── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  padding:15px;border:none;border-radius:14px;cursor:pointer;
  font-family:inherit;font-weight:600;font-size:15px;letter-spacing:-.1px;
  transition:transform .12s cubic-bezier(.3,1.3,.6,1),opacity .15s,box-shadow .15s}
.btn:active{transform:scale(.975)}
.btn-primary{background:var(--dandy-blue);color:#fff;box-shadow:var(--sh-cta)}
.btn-primary:disabled{opacity:.35;cursor:default}
.btn-secondary{background:rgba(255,255,255,.8);color:var(--dandy-blue);border:1px solid var(--card-border)}
.btn-ghost{background:transparent;color:var(--dandy-blue);font-size:15px}
.btn-pink{background:var(--dandy-pink);color:var(--dandy-blue)}
.btn-danger-ghost{background:transparent;color:var(--danger);font-size:15px}
.btn-sm{padding:10px 16px;font-size:14px;width:auto;border-radius:var(--r-full)}

.card{background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--r-lg);box-shadow:var(--sh-glass-sm)}
.glass-card{background:var(--glass-heavy);border:1px solid var(--glass-border);
  border-radius:var(--r-md);box-shadow:var(--sh-glass-sm)}

.input-group{margin-bottom:16px}
.input-label{display:block;font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:8px}
.input{width:100%;padding:16px;border-radius:var(--r-sm);border:1px solid var(--card-border);
  background:rgba(255,255,255,.9);font-family:inherit;font-size:16px;color:var(--dandy-blue);outline:none}
.input:focus{border-color:var(--dandy-blue);box-shadow:0 0 5.3px rgba(0,57,83,.25)}
.input.err{border-color:var(--danger)}
.input::placeholder{color:var(--text-tertiary)}

/* Curved gradient header (CurvedGradientHeader.tsx) */
.curve-header{background:var(--grad-header);color:#fff;position:relative;
  padding:0 var(--sp-screen) 40px;border-radius:0 0 32px 32px}
.curve-header .statusbar{margin:0 -20px}

/* Steps indicator (onboarding) */
.steps{display:flex;gap:6px;padding:12px var(--sp-screen) 4px}
.steps .dot{height:4px;flex:1;border-radius:2px;background:var(--step-inactive)}
.steps .dot.on{background:var(--dandy-blue)}

/* Segmented control (GlassSegmentControl) */
.segments{display:flex;background:var(--segment-bg);border-radius:var(--r-full);padding:4px;gap:2px}
.segments button{flex:1;padding:9px 2px;border:none;border-radius:var(--r-full);background:transparent;
  font-family:inherit;font-weight:600;font-size:12.5px;letter-spacing:-.1px;color:var(--text-secondary);
  cursor:pointer;transition:color .15s;white-space:nowrap}
.segments button.on{background:var(--segment-indicator);color:var(--dandy-blue);box-shadow:var(--sh-glass-sm)}

/* ── Floating glass tab bar — mirrors GlassTabBar.tsx ──
   Frosted pill + white sliding indicator + separate glass circle.
   The circle is the CAMERA (add-a-task), replacing the old AI sparkle. */
.tabwrap{position:absolute;left:0;right:0;bottom:14px;z-index:40;
  display:flex;align-items:center;gap:8px;padding:0 16px;pointer-events:none}
.glasspill{pointer-events:auto;position:relative;overflow:hidden;border-radius:999px;
  background:linear-gradient(rgba(255,255,255,.34),rgba(255,255,255,.10)),rgba(237,228,216,.42);
  backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px) saturate(1.4);
  border:.5px solid rgba(255,255,255,.55);box-shadow:0 4px 24px rgba(0,0,0,.12)}
.tabrow{display:flex;align-items:center;padding:3px;position:relative;flex:1}
.tab-item{flex:1;position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:9px 0 8px;border:none;background:none;cursor:pointer;font-family:inherit;
  border-radius:999px;transition:transform .12s}
.tab-item:active{transform:scale(.95)}
.tab-item .tlabel{font-size:10px;font-weight:600;letter-spacing:.1px;color:rgba(0,57,83,.5);transition:color .18s}
.tab-item.on .tlabel{color:var(--dandy-blue)}
.tab-item svg{width:22px;height:22px;stroke:rgba(0,57,83,.5);transition:stroke .18s}
.tab-item.on svg{stroke:var(--dandy-blue)}
.tab-ind{position:absolute;top:3px;bottom:3px;border-radius:999px;background:rgba(255,255,255,.88);
  border:.5px solid rgba(255,255,255,.9);box-shadow:0 2px 10px rgba(0,0,0,.15);z-index:1;
  transition:left .28s cubic-bezier(.32,1.35,.5,1),width .28s cubic-bezier(.32,1.35,.5,1)}
.cam-wrap{pointer-events:auto;display:flex;flex-direction:column;align-items:center;gap:3px;flex:none;
  margin-top:-14px /* label hangs below the pill line, circle rises above it */}
.cam-circle{position:relative;width:58px;height:58px;border-radius:50%;flex:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:linear-gradient(160deg,var(--dandy-blue-light),var(--dandy-blue));
  border:2.5px solid rgba(255,255,255,.85);
  box-shadow:0 6px 22px rgba(0,57,83,.38),0 2px 6px rgba(0,0,0,.12);
  transition:transform .15s cubic-bezier(.3,1.4,.6,1),box-shadow .15s}
.cam-circle:active{transform:scale(.9)}
.cam-circle svg{width:24px;height:24px;stroke:#fff}
.cam-badge{position:absolute;top:-3px;right:-3px;width:19px;height:19px;border-radius:50%;
  background:var(--dandy-pink);color:var(--dandy-blue);font-size:13px;font-weight:800;
  display:flex;align-items:center;justify-content:center;border:2px solid var(--dandy-warm);line-height:1}
.cam-label{font-size:10px;font-weight:700;color:var(--dandy-blue);letter-spacing:-.1px}

/* Task rows */
.task-row{display:flex;gap:11px;align-items:center;padding:12px 13px;background:var(--card);
  border:1px solid var(--card-border);border-radius:14px;margin-bottom:9px;
  transition:box-shadow .15s,opacity .15s}
.task-thumb{width:52px;height:52px;border-radius:10px;flex:none;background:var(--dandy-tan);
  display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
.task-meta{flex:1;min-width:0}
.task-meta .tt{font-weight:600;font-size:15px;color:var(--dandy-blue);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta .ts{font-size:12.5px;color:var(--text-secondary);margin-top:2px}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;
  padding:3px 9px;border-radius:var(--r-full);background:var(--dandy-tan);color:var(--text-secondary)}
.chip.lock{background:#FEF2F2;color:#991B1B}
.chip.sched{background:#E8F1F5;color:var(--dandy-blue)}
.chip.pink{background:var(--dandy-pink-light);color:var(--dandy-blue)}
.chip.done{background:#ECFDF5;color:var(--success)}
.chip.oos{background:#FFF7ED;color:#9A3412}

/* Sparkle motif */
.spark{color:var(--dandy-pink);display:inline-block}

/* Modal / overlay */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:50;
  display:flex;align-items:center;justify-content:center;padding:32px}
.modal{background:#fff;border-radius:var(--r-lg);padding:24px;width:100%;max-width:320px;text-align:center}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--dandy-cream);
  border-radius:24px 24px 0 0;padding:20px 20px 36px;z-index:60;box-shadow:0 -8px 40px rgba(0,0,0,.25)}
.sheet-grab{width:40px;height:4px;border-radius:2px;background:var(--step-inactive);margin:0 auto 16px}

/* Toast */
#toast{position:absolute;left:20px;right:20px;top:56px;z-index:99;pointer-events:none;
  transform:translateY(-16px);opacity:0;transition:all .25s}
#toast.show{transform:translateY(0);opacity:1}
#toast .toast-inner{background:#fff;border-radius:var(--r-sm);padding:13px 16px;
  box-shadow:0 4px 4px rgba(0,0,0,.1);font-size:14px;font-weight:500;display:flex;gap:8px;align-items:center}
#toast.error .toast-inner{border-left:4px solid var(--danger)}
#toast.success .toast-inner{border-left:4px solid var(--success)}

/* Flow index pill — the design-team navigator, not part of the app UI */
/* Design-team navigator — top center, dynamic-island style, so it never
   covers screen chrome in the corners */
#flowPill{position:absolute;top:9px;left:50%;transform:translateX(-50%);z-index:200;
  background:rgba(4,22,31,.92);color:#fff;border:none;border-radius:var(--r-full);
  padding:6px 14px;font-family:inherit;font-size:11.5px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.3);display:flex;gap:5px;align-items:center;
  transition:transform .15s}
#flowPill:active{transform:translateX(-50%) scale(.94)}
#flowPill .spark{color:var(--dandy-pink)}

/* Camera screens */
.cam{position:absolute;inset:0;background:#0b1215;color:#fff;display:flex;flex-direction:column}
.viewfinder{position:absolute;inset:0;background:
  radial-gradient(120% 90% at 30% 20%, #223a44 0%, #101d23 45%, #060b0e 100%)}
.viewfinder::after{content:"";position:absolute;inset:0;background:
  repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.012) 3px 4px)}
.rec-dot{width:10px;height:10px;border-radius:50%;background:#FF4A4A;animation:blink 1s infinite}
@keyframes blink{50%{opacity:.25}}
.rec-btn{width:76px;height:76px;border-radius:50%;border:4px solid #fff;background:transparent;
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.rec-btn .core{width:58px;height:58px;border-radius:50%;background:#FF4A4A;transition:all .2s}
.rec-btn.recording .core{width:30px;height:30px;border-radius:8px}

/* Misc */
.avatar{width:44px;height:44px;border-radius:50%;background:var(--grad-header);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex:none}
.avatar.lg{width:96px;height:96px;font-size:34px;border:4px solid #fff;box-shadow:var(--sh-glass)}
.hdr-back{background:none;border:none;font-size:22px;color:var(--dandy-blue);cursor:pointer;
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;margin-left:-10px}
.screen-hdr{display:flex;align-items:center;gap:4px;padding:6px var(--sp-screen) 10px}
.screen-hdr .ht{font-size:18px;font-weight:700;color:var(--dandy-blue)}
.divider{height:1px;background:var(--card-border);margin:4px 0}
.menu-item{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;background:transparent;border:none;width:100%;font-family:inherit;text-align:left}
.menu-item .mi-icon{width:34px;height:34px;border-radius:10px;background:var(--dandy-tan);display:flex;align-items:center;justify-content:center;font-size:16px;flex:none}
.menu-item .mi-label{font-weight:600;font-size:15px;color:var(--dandy-blue)}
.menu-item .mi-sub{font-size:12px;color:var(--text-secondary);margin-top:1px}
.menu-item .mi-chev{margin-left:auto;color:var(--text-tertiary);font-size:16px}

.timeslot{padding:12px 8px;border-radius:var(--r-sm);border:1.5px solid var(--card-border);
  background:rgba(255,255,255,.85);font-family:inherit;font-weight:600;font-size:13px;
  color:var(--dandy-blue);cursor:pointer;text-align:center}
.timeslot.on{border-color:var(--dandy-blue);background:var(--dandy-blue);color:#fff}
.timeslot.unavail{opacity:.35;text-decoration:line-through;cursor:default}
.daycell{flex:none;width:56px;padding:10px 0;border-radius:var(--r-sm);border:1.5px solid var(--card-border);
  background:rgba(255,255,255,.85);text-align:center;cursor:pointer}
.daycell.on{border-color:var(--dandy-blue);background:var(--dandy-blue)}
.daycell.on *{color:#fff!important}
.daycell .dw{font-size:11px;font-weight:600;color:var(--text-secondary)}
.daycell .dn{font-size:17px;font-weight:700;color:var(--dandy-blue);margin-top:2px}

/* Drag & drop (to-dos) — pointer-based so it works on touch */
.drag-handle{color:var(--text-tertiary);font-size:16px;cursor:grab;padding:6px 4px;margin:-6px 0;
  touch-action:none;user-select:none;-webkit-user-select:none;flex:none}
.task-row.dragging{opacity:.35}
.task-row.drop-above{box-shadow:0 -2px 0 0 var(--dandy-blue)}
.task-row.drop-below{box-shadow:0 2px 0 0 var(--dandy-blue)}
#dragGhost{position:fixed;z-index:999;pointer-events:none;width:340px;transform:rotate(1.5deg) scale(1.02);
  box-shadow:0 16px 40px rgba(0,57,83,.28);opacity:.97}
.dropzone-hint{border:1.5px dashed rgba(0,57,83,.25);border-radius:var(--r-md);padding:14px;
  text-align:center;font-size:12.5px;color:var(--text-tertiary);font-weight:500;margin-bottom:10px;
  transition:all .15s}
.dropzone-hint.hot{border-color:var(--dandy-blue);background:rgba(0,57,83,.05);color:var(--dandy-blue)}

.progressbar{height:8px;border-radius:4px;background:var(--dandy-tan);overflow:hidden}
.progressbar .fill{height:100%;border-radius:4px;background:var(--dandy-blue);transition:width .3s}
.progressbar .fill.over{background:var(--danger)}

/* ── Motion system — transform/opacity only, always gentle ──
   • .fadein staggers its direct children upward (max 12, 40ms apart)
   • .pop-in for success checkmarks (soft spring)
   • .tick-list li checks itself off sequentially (autopilot moment)
   • .twinkle for the single sparkle a screen is allowed
   • .bill-in for Bill's photo reveal
   • bars/counters animate via JS in AFTER hooks */
.fadein{animation:fadein .3s ease}
.fadein>*{animation:rise .38s cubic-bezier(.22,.9,.34,1) both}
.fadein>*:nth-child(1){animation-delay:.02s}.fadein>*:nth-child(2){animation-delay:.06s}
.fadein>*:nth-child(3){animation-delay:.1s}.fadein>*:nth-child(4){animation-delay:.14s}
.fadein>*:nth-child(5){animation-delay:.18s}.fadein>*:nth-child(6){animation-delay:.22s}
.fadein>*:nth-child(7){animation-delay:.26s}.fadein>*:nth-child(8){animation-delay:.3s}
.fadein>*:nth-child(9){animation-delay:.34s}.fadein>*:nth-child(10){animation-delay:.38s}
.fadein>*:nth-child(n+11){animation-delay:.42s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.pop-in{animation:pop .5s cubic-bezier(.26,1.6,.44,1) both}
@keyframes pop{0%{opacity:0;transform:scale(.5)}60%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
.bill-in{animation:billin .55s cubic-bezier(.22,1.2,.36,1) both}
@keyframes billin{from{opacity:0;transform:scale(.86) translateY(8px)}to{opacity:1;transform:none}}
.twinkle{animation:twinkle 2.6s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.55;transform:scale(1) rotate(0)}50%{opacity:1;transform:scale(1.18) rotate(8deg)}}
.tick-list li{list-style:none;display:flex;align-items:center;gap:11px;padding:10px 0;opacity:0;
  animation:rise .4s ease both}
.tick-list li .tickbox{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--card-border);
  background:#fff;flex:none;display:flex;align-items:center;justify-content:center;position:relative}
.tick-list li .tickbox svg{width:13px;height:13px;stroke:#fff;stroke-width:3;opacity:0}
.tick-list li.ticked .tickbox{background:var(--success);border-color:var(--success);
  transition:background .25s,border-color .25s}
.tick-list li.ticked .tickbox svg{opacity:1;transition:opacity .2s .05s}
.tick-list li.ticked .tick-text{color:var(--text-secondary)}
/* Sparkle burst — the surprise-and-delight payoff on big moments
   (task created, visit booked, wrapped finale). Brand confetti: pink ✦,
   blue dots, cream dots, flying outward and fading. */
.burst-p{position:absolute;z-index:300;pointer-events:none;font-size:14px;line-height:1;
  animation:burstfly .85s cubic-bezier(.15,.75,.4,1) forwards}
@keyframes burstfly{
  0%{opacity:0;transform:translate(0,0) scale(.4) rotate(0deg)}
  12%{opacity:1}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(var(--s,1)) rotate(var(--r,180deg))}}

/* ── Visit Wrapped — Instagram-story chrome ──
   Segmented progress at top, invisible tap zones (left=back, right=next),
   full-bleed panels with their own choreography. */
.story{position:absolute;inset:0;color:#fff;display:flex;flex-direction:column;overflow:hidden}
.story-segs{display:flex;gap:5px;padding:52px 16px 0;position:relative;z-index:6}
.story-segs .seg{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.28);overflow:hidden}
.story-segs .seg .segfill{height:100%;background:#fff;border-radius:2px;width:0%}
.story-segs .seg.done .segfill{width:100%}
.story-segs .seg.cur .segfill{width:100%;animation:segfill .35s ease-out}
@keyframes segfill{from{width:0%}to{width:100%}}
.story-tap{position:absolute;top:0;bottom:90px;z-index:5;background:none;border:none;cursor:pointer}
.story-close{position:absolute;top:46px;right:14px;z-index:7;background:rgba(255,255,255,.14);
  border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.story-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 30px 90px;
  text-align:center /* NO position/z-index — a stacking context here would
  trap .story-live children BELOW the tap zones (the v6/v7 dead-button bug) */}
.story-eyebrow{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;opacity:.65}
.story-title{font-weight:800;font-size:32px;letter-spacing:-.6px;line-height:1.12;margin-top:10px}
.story-sub{font-size:14.5px;line-height:1.6;opacity:.75;margin-top:12px}
.slide-up{animation:slideup .55s cubic-bezier(.2,.9,.3,1) both}
@keyframes slideup{from{opacity:0;transform:translateY(56px) scale(.96)}to{opacity:1;transform:none}}
.count-big{font-weight:800;font-size:64px;letter-spacing:-2px;line-height:1;font-variant-numeric:tabular-nums}
/* Value panel ("the receipt you didn't get"): staged reveal machinery.
   .stage elements start hidden; JS adds .on in sequence. The marketplace
   number gets a pink strike that draws across it, then the Dandy card
   slides up. */
.stage{opacity:0;transform:translateY(14px);transition:opacity .5s ease,transform .5s cubic-bezier(.22,.9,.34,1)}
.stage.on{opacity:1;transform:none}
.price-wrap{position:relative;display:inline-block}
.price-strike{position:absolute;left:-4%;top:52%;height:5px;width:0%;border-radius:3px;
  background:var(--dandy-pink);transform:rotate(-6deg);box-shadow:0 0 12px rgba(249,171,172,.6);
  transition:width .45s cubic-bezier(.3,.9,.3,1)}
.price-strike.on{width:108%}
.star{cursor:pointer;background:none;border:none;padding:4px;transition:transform .12s}
.star:active{transform:scale(1.2)}
.star svg{width:37px;height:37px;fill:rgba(255,255,255,.10);stroke:rgba(255,255,255,.45);
  stroke-width:1.1;stroke-linejoin:round;transition:fill .15s,stroke .15s,filter .2s}
.star.lit svg{fill:var(--dandy-pink);stroke:var(--dandy-pink-light);
  filter:drop-shadow(0 0 9px rgba(249,171,172,.75))}
.star.lit{animation:starpop .38s cubic-bezier(.3,1.6,.5,1)}
@keyframes starpop{0%{transform:scale(.8)}55%{transform:scale(1.3)}100%{transform:scale(1)}}
/* Interactive blocks inside story panels sit ABOVE the invisible tap zones
   (z-6 > z-5) so buttons/stars are actually tappable */
.story-live{position:relative;z-index:6}
/* Quick-add feedback: card settles into an "on your list" state */
.wrap-card{background:rgba(255,255,255,.96);border-radius:16px;padding:14px;margin-bottom:10px;
  color:var(--dandy-blue);transition:transform .3s cubic-bezier(.3,1.2,.5,1),opacity .3s,box-shadow .3s}
.wrap-card.added{transform:scale(.97);opacity:.85;box-shadow:inset 3px 0 0 var(--success)}
/* "+1 to your list" chip that floats up from the tapped button and fades */
.float-chip{position:absolute;z-index:310;pointer-events:none;background:var(--dandy-pink);
  color:var(--dandy-blue);font-size:11.5px;font-weight:800;padding:5px 11px;border-radius:99px;
  box-shadow:0 4px 14px rgba(0,0,0,.25);animation:floatup 1s cubic-bezier(.2,.8,.4,1) forwards;white-space:nowrap}
@keyframes floatup{0%{opacity:0;transform:translate(-50%,4px) scale(.7)}
  18%{opacity:1;transform:translate(-50%,-8px) scale(1.05)}
  100%{opacity:0;transform:translate(-50%,-52px) scale(1)}}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}
  .fadein>*,.tick-list li,.slide-up{opacity:1!important;transform:none!important}
  .story-segs .seg.cur .segfill{width:100%}}

/* swatches for brand kit screen */
.swatch{border-radius:var(--r-sm);padding:12px;min-height:74px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid rgba(0,0,0,.06)}
.swatch b{font-size:12px}.swatch span{font-size:11px;opacity:.75}
</style>
</head>

/* Sparkle burst at the center of an element (or screen center).
   ~16 brand-colored particles fly outward and fade. Pure CSS motion. */
function burst(el){
  const phone=document.getElementById('phone');
  const pr=phone.getBoundingClientRect();
  let x=pr.width/2, y=pr.height*0.42;
  if(el){const r=el.getBoundingClientRect(); x=r.left-pr.left+r.width/2; y=r.top-pr.top+r.height/2;}
  const bits=['✦','✦','✦','•','•','•','•','✦','•','✦','•','•','✦','•','✦','•'];
  const cols=['#F9ABAC','#FDDEDE','#FFF8F0','#F9ABAC','#ffffff','#FDDEDE'];
  bits.forEach((b,i)=>{
    const s=document.createElement('span');
    s.className='burst-p'; s.textContent=b;
    const ang=(i/bits.length)*Math.PI*2 + Math.random()*.5;
    const dist=60+Math.random()*70;
    s.style.cssText=`left:${x}px;top:${y}px;color:${cols[i%cols.length]};
      --dx:${Math.cos(ang)*dist}px;--dy:${Math.sin(ang)*dist-30}px;
      --s:${.7+Math.random()*.9};--r:${(Math.random()*280-140)|0}deg;
      font-size:${10+Math.random()*9}px;animation-delay:${Math.random()*.12}s`;
    phone.appendChild(s);
    setTimeout(()=>s.remove(),1100);
  });
}

/* Router.
   The tab bar renders into #tabhost — a sibling of the scrolling #screen —
   so it stays pinned while content scrolls (screens were previously
   rendering it inside the scroll container, which made it ride along). */
let current='flows';
let TAB_ACTIVE=null;
function bindNav(root){
  root.querySelectorAll('[data-go]').forEach(n=>{
    n.addEventListener('click',e=>{e.stopPropagation();
      const target=n.dataset.go;
      const o=n.dataset.opts?JSON.parse(n.dataset.opts):{};
      go(target,o);
    });
  });
}
function go(id, opts={}){
  if(S.camTimer){clearInterval(S.camTimer);S.camTimer=null}
  if(typeof wrapRateTimer!=='undefined'){clearTimeout(wrapRateTimer)}
  if(typeof wrapAdvTimer!=='undefined'){clearTimeout(wrapAdvTimer)}
  const tpl=SCREENS[id];
  if(!tpl){toast('Screen "'+id+'" not found','error');return}
  current=id;
  TAB_ACTIVE=null;                      // screens opt in by calling tabbar()
  const el=document.getElementById('screen');
  el.innerHTML=tpl(opts);
  el.scrollTop=0;
  bindNav(el);
  const host=document.getElementById('tabhost');
  host.innerHTML = TAB_ACTIVE ? renderTabbar(TAB_ACTIVE) : '';
  bindNav(host);
  if(AFTER[id]) AFTER[id](opts);
}

/* ── Pointer-based drag & drop (works with mouse + touch) ──
   Grab the ⠿ handle → ghost follows the pointer → rows part to show the
   insertion line → drop reorders within a list or moves between the visit
   section and the backlog (drag-to-schedule). Capacity is enforced the same
   way as the booking wizard. */
let DRAG=null;
function startDrag(e,taskId){
  e.preventDefault();
  const row=e.target.closest('.task-row');
  const ghost=row.cloneNode(true);
  ghost.id='dragGhost';
  ghost.style.width=row.offsetWidth+'px';
  document.getElementById('phone').appendChild(ghost);
  row.classList.add('dragging');
  DRAG={taskId,row,ghost,ox:e.clientX-row.getBoundingClientRect().left,oy:e.clientY-row.getBoundingClientRect().top,target:null,pos:null};
  moveGhost(e);
  document.addEventListener('pointermove',onDragMove,{passive:false});
  document.addEventListener('pointerup',onDragEnd,{once:true});
}
function moveGhost(e){
  DRAG.ghost.style.left=(e.clientX-DRAG.ox)+'px';
  DRAG.ghost.style.top=(e.clientY-DRAG.oy)+'px';
}
function onDragMove(e){
  if(!DRAG)return;
  e.preventDefault();
  moveGhost(e);
  document.querySelectorAll('.task-row.drop-above,.task-row.drop-below').forEach(n=>n.classList.remove('drop-above','drop-below'));
  document.getElementById('visitHint')?.classList.remove('hot');
  DRAG.target=null;DRAG.pos=null;
  const els=document.elementsFromPoint(e.clientX,e.clientY);
  const hint=els.find(n=>n.id==='visitHint');
  if(hint){hint.classList.add('hot');DRAG.target={zone:'visit',index:S.visitTasks.length};return}
  const overRow=els.find(n=>n.classList&&n.classList.contains('task-row')&&!n.classList.contains('dragging')&&n.dataset.task);
  if(overRow&&overRow.dataset.list){
    const r=overRow.getBoundingClientRect();
    const before=e.clientY < r.top+r.height/2;
    overRow.classList.add(before?'drop-above':'drop-below');
    const list=overRow.dataset.list==='visit'?S.visitTasks:S.backlog;
    let idx=list.indexOf(Number(overRow.dataset.task)); if(!before)idx++;
    DRAG.target={zone:overRow.dataset.list,index:idx};
  } else {
    const zone=els.find(n=>n.dataset&&n.dataset.zone);
    if(zone)DRAG.target={zone:zone.dataset.zone,index:(zone.dataset.zone==='visit'?S.visitTasks:S.backlog).length};
  }
}
function onDragEnd(){
  document.removeEventListener('pointermove',onDragMove);
  if(!DRAG)return;
  const {taskId,target}=DRAG;
  DRAG.ghost.remove();DRAG.row.classList.remove('dragging');
  if(target){
    /* Capacity check when scheduling onto the visit */
    if(target.zone==='visit'&&!S.visitTasks.includes(taskId)){
      const t=TASKS.find(x=>x.id===taskId);
      const used=S.visitTasks.map(id=>TASKS.find(x=>x.id===id)).reduce((a,x)=>a+(x.est||0),0)+(t.est||0);
      if(used>VISIT_TYPES.full.capMin){
        toast("That won\'t fit — this visit is at capacity",'error');DRAG=null;go('todos');return;
      }
    }
    /* remove from both, insert at target */
    const from=S.visitTasks.includes(taskId)?S.visitTasks:S.backlog;
    const fromIdx=from.indexOf(taskId);
    const dest=target.zone==='visit'?S.visitTasks:S.backlog;
    let idx=target.index;
    if(from===dest&&fromIdx<idx)idx--;
    from.splice(fromIdx,1);
    dest.splice(Math.min(idx,dest.length),0,taskId);
    const moved=from!==dest;
    go('todos');
    if(moved&&target.zone==='visit'){
      toast('Scheduled for Mon, Jul 14');
      const row=document.querySelector(`#visitList [data-task="${taskId}"]`);
      if(row) burst(row);
    } else if(moved) toast('Moved back to your list');
  }
  DRAG=null;
}

SCREENS.bookTasks = (o={}) => {
  if(o.type){ S.booking.type=o.type; S.plan = o.type==='quick'?'monthly':'quarterly'; }

  if(!S.booking.date){S.booking.date='14';S.booking.slot=SLOTS()[0][0];}
  const CAP = bookedType().capMin;
  const inVisit = TASKS.filter(t=>S.booking.tasks.includes(t.id));
  const avail   = TASKS.filter(t=>!S.booking.tasks.includes(t.id)&&!t.scheduled);
  const used = inVisit.reduce((a,t)=>a+(t.est||0),0);
  const hasUnest = inVisit.some(t=>!t.est);
  const over = used>CAP;
  const pct = Math.min(100,Math.round(used/CAP*100));

          :'⚠️ That\'s more than fits in one visit — remove a task or save some for next quarter.')
        :hasUnest?'Some tasks are still being estimated, so we cap un-estimated visits at '+MAX_UNESTIMATED+' tasks.'

function toggleVisitTask(id){
  const i=S.booking.tasks.indexOf(id);
  if(i>-1){S.booking.tasks.splice(i,1);go('bookTasks');return}
  /* Evaluate load as if the candidate were already scheduled (matches addToVisit) */
  const vt=bookedType();
  const next=[...S.booking.tasks,id].map(x=>TASKS.find(t=>t.id===x));
  const used=next.reduce((a,t)=>a+(t.est||0),0);
  const hasUnest=next.some(t=>!t.est);
  if(used>vt.capMin){
    go('bookTasks');
    const m=document.getElementById('fullModal');
    document.getElementById('fullTitle').textContent=vt.key==='quick'?'Too big for a monthly visit':'Visit is full';
    document.getElementById('fullBody').innerHTML=vt.key==='quick'
      ?`These tasks add up to <b>${fmtMin(used)}</b> — more than the roughly <b>${fmtMin(vt.capMin)}</b> a 1.5-hour monthly visit can hold. Trim the list, or text Bill about quarterly half-days and knock it all out in one go.`
      :`These tasks add up to <b>${fmtMin(used)}</b> — more than the roughly <b>${fmtMin(vt.capMin)}</b> of work in a half-day visit. Remove a task before adding another, or save some for next quarter.`;
    m.style.display='flex';return;
  }
  if(hasUnest&&next.length>MAX_UNESTIMATED){
    go('bookTasks');
    const m=document.getElementById('fullModal');
    document.getElementById('fullTitle').textContent='Task limit reached';
    document.getElementById('fullBody').textContent=`More than ${MAX_UNESTIMATED} tasks might be too much for one 3.5-hour visit while estimates are pending. Remove a task before adding another.`;
    m.style.display='flex';return;
  }
  S.booking.tasks.push(id);go('bookTasks');
}

AFTER.wrapped = (o)=>{
  const p=o.p||0;

    setTimeout(()=>on('vs0'),250);
    setTimeout(()=>on('vs1'),600);
    setTimeout(()=>on('vs2'),1350);
    /* the meter runs: eased count 0 → $836, ticking in uneven jumps so it
       reads like a tally, with a nudge of scale as it lands */
    setTimeout(()=>{
      const el=document.getElementById('vsNum'); if(!el||!alive())return;
      const target=836, dur=1500, t0=performance.now();
      const ease=x=>1-Math.pow(1-x,3);
      const raf=window.requestAnimationFrame||((f)=>setTimeout(()=>f(performance.now()),16));
      (function tick(now){
        if(!alive())return;
        const k=Math.min(1,(now-t0)/dur);
        el.textContent='$'+Math.round(ease(k)*target);
        if(k<1) raf(tick);
        else{
          el.style.transition='transform .25s cubic-bezier(.3,1.5,.5,1)';
          el.style.transform='scale(1.07)'; setTimeout(()=>el.style.transform='',260);

          /* strike it through, then bring in the Dandy card */
          setTimeout(()=>{const s=document.getElementById('vsStrike'); if(s&&alive())s.classList.add('on');},650);
          setTimeout(()=>{ if(!alive())return; on('vs3');
            setTimeout(()=>{const sp=document.getElementById('vsSpark'); if(sp&&alive())burst(sp);},420);
          },1150);
          setTimeout(()=>on('vs4'),1900);
        }
      })(t0);
    },1700);
  }
  if(p===4){ /* 3 → 0: the zero moment */
    const el=document.getElementById('zeroNum');
    setTimeout(()=>{ if(!el)return; let v=3;
      const iv=setInterval(()=>{ v--; el.textContent=v;
        if(v<=0){clearInterval(iv); el.style.transition='transform .3s cubic-bezier(.3,1.6,.5,1)';
          el.style.transform='scale(1.15)'; setTimeout(()=>el.style.transform='',300); burst(el);} },500);

  btn.classList.remove('btn-secondary');
  btn.style.background='var(--success)'; btn.style.color='#fff';
  btn.disabled=true;
  document.getElementById('wrapCard'+id)?.classList.add('added');
  const phone=document.getElementById('phone');

  const chip=document.createElement('span');
  chip.className='float-chip'; chip.textContent='+1 to your list ✦';
  chip.style.left=(br.left-pr.left+br.width/2)+'px';
  chip.style.top=(br.top-pr.top)+'px';
  phone.appendChild(chip); setTimeout(()=>chip.remove(),1050);
  burst(btn);

  if(note) note.textContent="They'll be waiting in your To-do's ✦";
  if(S.wrapAdded.length===WRAP_SUGGEST.length) wrapAllDone();

function wrapAddAll(allBtn){
  allBtn.disabled=true; allBtn.style.opacity='.55';
  const remaining=WRAP_SUGGEST.filter(s=>!S.wrapAdded.includes(s.id));
  remaining.forEach((s,i)=>setTimeout(()=>{
    const btn=document.getElementById('wrapBtn'+s.id);
    if(btn) wrapAdd(s.id,btn); else wrapAdd(s.id,{style:{},classList:{remove(){}},getBoundingClientRect:()=>document.getElementById('phone').getBoundingClientRect()});
  }, i*340));
}
/* Everything's on the list → green celebration, then advance. */
function wrapAllDone(){
  const all=document.getElementById('wrapAddAll');
  if(all){ all.textContent='✓ Both added to your list'; all.disabled=true;
    all.style.opacity='1'; all.style.background='var(--success)'; all.style.color='#fff'; }
  clearTimeout(wrapAdvTimer);
  wrapAdvTimer=setTimeout(()=>{
    if(current!=='wrapped') return;
    if(all) burst(all);
    const note=document.getElementById('wrapAddNote');
    if(note) note.textContent='Bill will see them before your next visit';
    wrapAdvTimer=setTimeout(()=>{ if(current==='wrapped') go('wrapped',{p:6}); },1100);
  },500);
}
/* Stars: every star is individually tappable and adjustable. Each tap
   re-runs a cascade fill up to n (pink pop, 70ms apart). 4–5 stars earns
   the big surprise burst. The panel advances ~1.6s after the LAST tap —
   switching resets the clock, and back-tapping returns with the rating
   kept (S.wrapStars). */
let wrapRateTimer=null;
let wrapRateGen=0; /* generation token: a new tap invalidates the previous
                      cascade's pending timers (prevents old timeouts from
                      re-lighting stars after a rapid switch) */
function wrapRate(n,el){
  S.wrapStars=n;
  const gen=++wrapRateGen;
  const stars=[...document.querySelectorAll('#starRow .star')];
  stars.forEach((s,i)=>{
    s.classList.remove('lit');
    if(i<n){ void s.offsetWidth; /* restart pop animation */
      setTimeout(()=>{ if(gen===wrapRateGen) s.classList.add('lit'); }, i*70); }
  });
  const msg=document.getElementById('rateMsg');
  if(msg) msg.textContent=(n>=4?"He'll be thrilled — thank you ✦":"Thanks for the honesty — we'll make it right.");
  if(n>=4){ setTimeout(()=>{ burst(el); const row=document.getElementById('starRow'); if(row&&n===5) setTimeout(()=>burst(row),220); }, n*70+120); }
  clearTimeout(wrapRateTimer);
  wrapRateTimer=setTimeout(()=>{ if(current==='wrapped') go('wrapped',{p:7}); },1650);
}

function smsSend(){
  const draft=document.getElementById('smsDraft'), sent=document.getElementById('smsSent');
  if(!draft||!draft.textContent.trim()) return;
  sent.textContent=draft.textContent; sent.style.display='block';
  draft.textContent='';
  document.getElementById('smsStatus').style.display='block';
  const typing=document.getElementById('smsTyping'), reply=document.getElementById('smsReply');
  const th=document.getElementById('smsThread'); th.scrollTop=th.scrollHeight;
  setTimeout(()=>{ if(typing) typing.style.display='block'; },900);
  setTimeout(()=>{
    if(!typing||!reply) return;
    typing.style.display='none';
    reply.textContent = smsIntent==='dropin'
